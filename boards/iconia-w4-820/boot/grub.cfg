set timeout=3
set pager=1
terminal_output console
echo "=== iconia self-built grub v2 (nokaslr no5lvl) ==="
search --no-floppy --file --set=root /syslinux/vmlinuz.A
echo "root=$root -- auto-booting in 3s"
menuentry "FydeOS A (nokaslr no5lvl)" {
  echo "grub: loading /syslinux/vmlinuz.A"
  linux /syslinux/vmlinuz.A init=/sbin/init rootwait ro noresume loglevel=8 noinitrd audit=0 console=tty1 earlyprintk=efi,keep initcall_debug nokaslr no5lvl cros_efi root=PARTUUID=7A3B48A6-4AA1-A944-BD0F-B3C8E0418870
  echo "grub: kernel loaded, calling boot()..."
  boot
}
